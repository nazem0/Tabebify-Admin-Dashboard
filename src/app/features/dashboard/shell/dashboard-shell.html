<div class="flex h-screen overflow-hidden bg-surface">

  <!-- Desktop sidebar -->
  <app-sidebar
    [isCollapsed]="sidebarCollapsed()"
    (collapseToggled)="toggleSidebar()"
    class="hidden lg:flex shrink-0"
  />

  <!-- Main area -->
  <div class="flex flex-1 flex-col min-w-0 overflow-hidden">

    <!-- Header -->
    <header
      class="h-16 flex items-center justify-between px-4 sm:px-6 bg-white border-b border-outline-variant/20 shrink-0"
    >
      <!-- Left: mobile menu toggle + page title -->
      <div class="flex items-center gap-3">
        <button
          type="button"
          class="lg:hidden flex items-center justify-center w-9 h-9 rounded-xl text-on-surface-variant hover:bg-surface-container-low hover:text-primary transition-all"
          (click)="mobileMenuOpen.update(v => !v)"
          aria-label="Open navigation menu"
          [attr.aria-expanded]="mobileMenuOpen()"
        >
          <span class="material-symbols-outlined text-[22px]" aria-hidden="true">menu</span>
        </button>
        <h1 class="text-base font-semibold text-primary">{{ pageTitle() }}</h1>
      </div>

      <!-- Right: logout -->
      <button
        type="button"
        (click)="logout()"
        class="flex items-center gap-2 px-3 py-2 rounded-xl text-sm font-medium text-on-surface-variant
               hover:text-primary hover:bg-surface-container-low transition-all"
        aria-label="Logout"
      >
        <span class="material-symbols-outlined text-[20px]" aria-hidden="true">logout</span>
        <span class="hidden sm:inline">Logout</span>
      </button>
    </header>

    <!-- Page content -->
    <main class="flex-1 overflow-auto p-7 " >
      <router-outlet />
    </main>

  </div>

  <!-- Mobile sidebar overlay -->
  @if (mobileMenuOpen()) {
    <div
      class="fixed inset-0 z-40 lg:hidden"
      (click)="closeMobileMenu()"
      aria-hidden="true"
    >
      <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
    </div>

    <div class="fixed inset-y-0 left-0 z-50 flex lg:hidden">
      <app-sidebar
        [isCollapsed]="false"
        (collapseToggled)="closeMobileMenu()"
      />
    </div>
  }

</div>
