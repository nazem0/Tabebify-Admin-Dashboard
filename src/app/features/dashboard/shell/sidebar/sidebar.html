<aside
  class="h-full flex flex-col bg-primary transition-[width] duration-300 ease-in-out overflow-hidden select-none"
  [class.w-64]="!isCollapsed()"
  [class.w-16]="isCollapsed()"
  [attr.aria-label]="isCollapsed() ? 'Collapsed navigation' : 'Main navigation'"
>

  <!-- Logo Section -->
  <div class="flex items-center h-16 px-4 border-b border-white/10 shrink-0 overflow-hidden">
    <div class="flex items-center w-full" [class.justify-center]="isCollapsed()">
      @if (!isCollapsed()) {
        <span class="text-xl font-extrabold tracking-tighter text-white whitespace-nowrap animate-fade-in">
          Tabebi<span class="text-accent-teal">fy</span>
        </span>
      } @else {
        <div class="w-8 h-8 shrink-0 animate-fade-in">
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" class="w-full h-full">
            <path
              d="M20 30C20 24.4772 24.4772 20 30 20H70C75.5228 20 80 24.4772 80 30V35C80 37.7614 77.7614 40 75 40H60C54.4772 40 50 44.4772 50 50V70C50 75.5228 45.5228 80 40 80H35C32.2386 80 30 77.7614 30 75V35C30 32.2386 27.7614 30 25 30H20Z"
              fill="white"
              fill-opacity="0.9"
            />
            <circle cx="65" cy="45" r="8" fill="#00D8CF" />
          </svg>
        </div>
      }
    </div>
  </div>

  <!-- Navigation Links -->
  <nav class="flex-1 overflow-y-auto py-4 space-y-0.5 custom-sidebar-scroll" aria-label="Dashboard navigation">
    @for (section of navSections; track section.label) {

      <!-- Section Header / Divider Area -->
      <div class="relative h-9 flex items-center overflow-hidden">
        @if (!isCollapsed()) {
          <p class="absolute left-0 px-5 text-[10px] font-semibold uppercase tracking-widest text-white/30 whitespace-nowrap animate-fade-in">
            {{ section.label }}
          </p>
        } @else {
          <div class="w-full mx-3 border-t border-white/10 animate-fade-in"></div>
        }
      </div>

      <!-- Section Items -->
      @for (item of section.items; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="bg-white/10 !text-accent-teal font-semibold"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex items-center mx-2 px-3 py-2.5 rounded-xl text-sm font-medium text-white/60
                 hover:text-white hover:bg-white/5 transition-all duration-200 group"
          [class.justify-center]="isCollapsed()"
          [attr.title]="isCollapsed() ? item.label : null"
          [attr.aria-label]="isCollapsed() ? item.label : null"
        >
          <!-- Icon Context -->
          <span 
            class="material-symbols-outlined text-[20px] shrink-0 transition-transform duration-200 group-hover:scale-105" 
            [class.mx-auto]="isCollapsed()"
            aria-hidden="true"
          >
            {{ item.icon }}
          </span>

          <!-- Label Context -->
          @if (!isCollapsed()) {
            <span class="ml-3 whitespace-nowrap animate-fade-in">{{ item.label }}</span>
          }
        </a>
      }
    }
  </nav>

  <!-- Collapse Toggle Button -->
  <div class="shrink-0 border-t border-white/10 p-3">
    <button
      type="button"
      (click)="toggle()"
      class="w-full flex items-center px-3 py-2.5 rounded-xl text-white/40 hover:text-white hover:bg-white/5 transition-all duration-200"
      [class.justify-center]="isCollapsed()"
      [attr.aria-label]="isCollapsed() ? 'Expand sidebar' : 'Collapse sidebar'"
    >
      <span class="material-symbols-outlined text-[20px] shrink-0" aria-hidden="true">
        {{ isCollapsed() ? 'chevron_right' : 'chevron_left' }}
      </span>
      @if (!isCollapsed()) {
        <span class="ml-3 text-xs font-medium whitespace-nowrap animate-fade-in">Collapse</span>
      }
    </button>
  </div>

</aside>
