<div class="space-y-6">

  <!-- Page Header -->
  <div>
    <h1 class="font-headline-lg text-headline-lg text-primary">Dashboard Overview</h1>
    <p class="text-sm text-on-surface-variant mt-1">Real-time monitoring of Tabebify clinical operations.</p>
  </div>

  <!-- Error Alert -->
  @if (error()) {
    <div
      class="flex items-start gap-3 px-4 py-3 rounded-xl bg-error/10 border border-error/20 text-error"
      role="alert"
      aria-live="assertive"
    >
      <span class="material-symbols-outlined text-[20px] shrink-0 mt-0.5" aria-hidden="true">error</span>
      <p class="text-sm font-medium">{{ error() }}</p>
    </div>
  }

  <!-- Analytics Cards -->
  <section aria-label="Key metrics">
    <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
      @if (isLoading()) {
        @for (i of [1,2,3,4]; track i) {
          <div class="animate-pulse bg-white rounded-2xl border border-outline-variant/20 shadow-sm h-32" aria-hidden="true"></div>
        }
      } @else {
        <app-analytics-card
          title="Total Users"
          [value]="analytics()?.totalUsers ?? null"
          [growth]="analytics()?.usersGrowthPercentage ?? 0"
          icon="group"
        />
        <app-analytics-card
          title="Total Nurses"
          [value]="analytics()?.totalNurses ?? null"
          [growth]="analytics()?.nursesGrowthPercentage ?? 0"
          icon="medical_services"
        />
        <app-analytics-card
          title="Total Bookings"
          [value]="analytics()?.totalBookings ?? null"
          [growth]="analytics()?.bookingsGrowthPercentage ?? 0"
          icon="calendar_month"
        />
        <app-analytics-card
          title="Active Users"
          [value]="analytics()?.activeUsers ?? null"
          [isDark]="true"
          icon="person_raised_hand"
        />
      }
    </div>
  </section>

  <!-- Charts Row -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
    @if (isLoading()) {
      <div class="animate-pulse bg-white rounded-2xl border border-outline-variant/20 shadow-sm h-72 lg:col-span-2" aria-hidden="true"></div>
      <div class="animate-pulse bg-white rounded-2xl border border-outline-variant/20 shadow-sm h-72" aria-hidden="true"></div>
    } @else {
      <div class="lg:col-span-2">
        <app-revenue-chart
          [data]="analytics()?.revenueAnalytics ?? []"
          [activePeriod]="currentPeriod()"
          (periodChanged)="onPeriodChange($event)"
        />
      </div>
      <app-booking-status [status]="analytics()?.bookingStatus" />
    }
  </div>

  <!-- Recent Bookings -->
  <app-recent-bookings-table
    [bookings]="recentBookings()"
    [isLoading]="isLoading()"
  />

</div>
