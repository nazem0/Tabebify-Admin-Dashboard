<div class="p-6 grid grid-cols-3 gap-4" role="list" aria-label="Service statistics">

    <!-- Base Price -->
    <div class="bg-surface-container-lowest p-5 rounded-2xl border border-outline-variant/30 shadow-sm" role="listitem">
        <p class="text-label-sm font-bold uppercase tracking-widest text-on-surface-variant/50 mb-2">
            Base Price
        </p>
        <div class="flex items-baseline gap-1">
            <span class="text-headline-md font-headline-md text-primary">
                {{ price() | appCurrency }}
            </span>
            <span class="text-label-sm text-on-surface-variant/40">/ session</span>
        </div>
    </div>

    <!-- Standard Duration -->
    <div class="bg-surface-container-lowest p-5 rounded-2xl border border-outline-variant/30 shadow-sm" role="listitem">
        <p class="text-label-sm font-bold uppercase tracking-widest text-on-surface-variant/50 mb-2">
            Standard Duration
        </p>
        <span class="text-headline-md font-headline-md text-primary">
            @if (durationMinutes() != null) {
            {{ durationMinutes() }} mins
            } @else {
            —
            }
        </span>
    </div>

    <!-- Service Icon -->
    <div class="bg-surface-container-lowest p-5 rounded-2xl border border-outline-variant/30 shadow-sm" role="listitem">
        <p class="text-label-sm font-bold uppercase tracking-widest text-on-surface-variant/50 mb-2">
            Service Icon
        </p>
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-primary/5 rounded-lg flex items-center justify-center text-primary"
                aria-hidden="true">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">{{ iconUrl() ||
                    'medical_services' }}</span>
            </div>
            <span class="text-body-md font-bold text-on-surface-variant">
                {{ iconUrl() ? 'Custom Icon' : 'Default Icon' }}
            </span>
        </div>
    </div>
</div>
